<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="container">

        <h1>🔗 URL Shortener</h1>

        <input
            type="text"
            id="urlInput"
            placeholder="Enter Long URL Here">

        <button id="shortenBtn">
            Generate Short URL
        </button>

        <div id="result"></div>

        <hr>

        <h2>History</h2>

        <table id="historyTable">

            <thead>
                <tr>
                    <th>Full URL</th>
                    <th>Short URL</th>
                    <th>Total Clicks</th>
                </tr>
            </thead>

            <tbody id="historyBody">

            </tbody>

        </table>

    </div>

    <script src="/js/app.js"></script>

</body>
</html>
